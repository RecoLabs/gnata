<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gnata</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>G</text></svg>">
<link rel="preload" href="gnata.wasm" as="fetch" type="application/wasm">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
  }

  [data-theme="dark"] {
    --bg: #0F2032;
    --surface: #172A3E;
    --surface-hover: rgba(255,255,255,0.05);
    --text: #E1E2EF;
    --text-strong: #FDF8F8;
    --accent: #B5E600;
    --accent-dim: rgba(181, 230, 0, 0.12);
    --accent-hover: #c8f21a;
    --accent-text: #0F2032;
    --vista: #869CFF;
    --error: #E55381;
    --muted: #6b7a8d;
    --border: #1f3348;
    --border-light: #253d55;
    --editor-bg: #0F2032;
    --reco-logo: #B5E600;
    color-scheme: dark;
  }

  [data-theme="light"] {
    --bg: #d8dde5;
    --surface: #e2e7ee;
    --surface-hover: rgba(0,0,0,0.06);
    --text: #2e2e3e;
    --text-strong: #1a1a2a;
    --accent: #2563eb;
    --accent-dim: rgba(37, 99, 235, 0.10);
    --accent-hover: #1d4ed8;
    --accent-text: #ffffff;
    --vista: #5b6aff;
    --error: #d63362;
    --muted: #6a6a7a;
    --border: #c4cbd6;
    --border-light: #b8c0cc;
    --editor-bg: #e2e7ee;
    --reco-logo: #0F2032;
    color-scheme: light;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Onest', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.25s, color 0.25s;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.25s, border-color 0.25s;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text-strong);
  }

  header h1 span { color: var(--accent); font-family: 'Poppins', sans-serif; font-weight: 600; }

  header .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  .header-links {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-links a {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 6px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .header-links a:hover {
    color: var(--text-strong);
    background: var(--surface-hover);
  }

  .header-links .sep {
    width: 1px;
    height: 16px;
    background: var(--border-light);
    margin: 0 2px;
  }

  .theme-toggle {
    background: none;
    border: 1px solid var(--border-light);
    color: var(--muted);
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1;
  }

  .theme-toggle:hover {
    color: var(--text-strong);
    border-color: var(--muted);
    background: var(--surface-hover);
  }

  .status {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    padding-left: 8px;
  }

  .status .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status.ready .dot { background: var(--accent); }
  .status.ready { color: var(--accent); }

  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s ease;
    z-index: 999;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr auto;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.25s;
  }

  .panel:last-child { border-right: none; }

  .panel-header {
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: background 0.25s, border-color 0.25s;
  }

  .expr-bar {
    grid-column: 1 / -1;
    display: flex;
    align-items: stretch;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.25s, border-color 0.25s;
  }

  .expr-bar .panel-header {
    border-bottom: none;
    border-right: 1px solid var(--border);
    min-width: 120px;
  }

  #expression {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-strong);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 12px 16px;
    outline: none;
    resize: none;
  }

  #expression::placeholder { color: var(--muted); }

  textarea, pre {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 16px;
    outline: none;
    resize: none;
    overflow: auto;
    tab-size: 2;
    white-space: pre;
    transition: color 0.25s;
  }

  #result {
    margin: 0;
    line-height: 1.5;
    min-height: 100%;
  }

  #result.error { color: var(--error); }
  #result.success { color: var(--accent); }

  .toolbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    transition: background 0.25s, border-color 0.25s;
  }

  button {
    font-family: 'Onest', inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--accent-text);
  }

  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border-light);
  }

  .btn-ghost:hover {
    color: var(--text);
    border-color: var(--muted);
  }

  .timing {
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--accent);
  }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reco-link {
    display: flex;
    align-items: center;
    text-decoration: none;
    padding: 5px 10px;
    border-radius: 6px;
    transition: all 0.15s;
    opacity: 0.5;
  }

  .reco-link:hover {
    opacity: 0.85;
    background: var(--surface-hover);
  }

  .reco-link svg { height: 20px; width: auto; }
  .reco-link svg path { fill: var(--reco-logo); transition: fill 0.25s; }

  kbd {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    padding: 3px 7px;
    border-radius: 4px;
    margin-left: 8px;
    letter-spacing: 1px;
  }

  .btn-primary kbd {
    background: rgba(255,255,255,0.2);
    color: var(--accent-text);
  }

  .examples {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .example-chip {
    font-family: 'Onest', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 12px;
    background: var(--border-light);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }

  .example-chip:hover {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .icon-ext {
    width: 10px;
    height: 10px;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr 1fr auto;
    }
    .panel { border-right: none; border-bottom: 1px solid var(--border); }
    .header-links { gap: 2px; }
    .header-links a { font-size: 11px; padding: 4px 6px; }
  }
</style>
</head>
<body>

<script>
const THEME_KEY = 'gnata-playground-theme';

function getPreferredTheme() {
  const stored = localStorage.getItem(THEME_KEY);
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem(THEME_KEY, theme);
  const icon = document.querySelector('.theme-icon');
  icon.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
}

applyTheme(getPreferredTheme());

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', e => {
  if (!localStorage.getItem(THEME_KEY)) {
    applyTheme(e.matches ? 'light' : 'dark');
  }
});

const examples = {
  invoice: {
    expr: '$sum(Account.Order.Product.(Price * Quantity))',
    data: `{
  "Account": {
    "Name": "Firefly",
    "Order": [
      {
        "OrderID": "order103",
        "Product": [
          { "Name": "Bowler Hat", "Price": 34.45, "Quantity": 2 },
          { "Name": "Trilby hat", "Price": 21.67, "Quantity": 1 }
        ]
      },
      {
        "OrderID": "order104",
        "Product": [
          { "Name": "Cloak", "Price": 107.99, "Quantity": 1 }
        ]
      }
    ]
  }
}`
  },
  users: {
    expr: '$filter(users, function($u) { $u.age >= 21 }).name',
    data: `{
  "users": [
    { "name": "Alice", "age": 30, "role": "admin" },
    { "name": "Bob", "age": 17, "role": "viewer" },
    { "name": "Carol", "age": 25, "role": "editor" },
    { "name": "Dave", "age": 19, "role": "viewer" }
  ]
}`
  },
  simple: {
    expr: 'event.action = "login" and event.severity > 3',
    data: `{
  "event": {
    "action": "login",
    "severity": 5,
    "user": "admin@example.com",
    "metadata": { "ip": "10.0.0.1", "geo": "US" }
  }
}`
  }
};

const statusEl = document.getElementById('status');
const exprEl = document.getElementById('expression');
const inputEl = document.getElementById('input');
const resultEl = document.getElementById('result');
const timingEl = document.getElementById('timing');
const runBtn = document.getElementById('runBtn');
const clearBtn = document.getElementById('clearBtn');

const go = new Go();
const progressBar = document.getElementById('progressBar');

async function loadWasm() {
  // Stream the fetch so we can track download progress.
  const resp = await fetch('gnata.wasm');
  const total = parseInt(resp.headers.get('content-length') || '0', 10);
  let loaded = 0;

  const stream = new ReadableStream({
    async start(controller) {
      const reader = resp.body.getReader();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        loaded += value.byteLength;
        if (total > 0) {
          const pct = Math.min(95, (loaded / total) * 100);
          progressBar.style.width = pct + '%';
          const kb = Math.round(loaded / 1024);
          const totalKb = Math.round(total / 1024);
          statusEl.querySelector('span:last-child').textContent =
            `${kb} / ${totalKb} KB`;
        }
        controller.enqueue(value);
      }
      controller.close();
    }
  });

  const tracked = new Response(stream, { headers: resp.headers });
  const result = await WebAssembly.instantiateStreaming(tracked, go.importObject);
  const wrapWasm = fn => (...args) => { const r = fn(...args); if (r instanceof Error) throw r; return r; };
  window.gnataEval          = wrapWasm((...a) => window._gnataEval(...a));
  window.gnataCompile       = wrapWasm((...a) => window._gnataCompile(...a));
  window.gnataEvalHandle    = wrapWasm((...a) => window._gnataEvalHandle(...a));
  window.gnataReleaseHandle = wrapWasm((...a) => window._gnataReleaseHandle(...a));

  go.run(result.instance).catch(err => {
    statusEl.classList.remove('ready');
    statusEl.querySelector('span:last-child').textContent = 'Runtime crash';
    resultEl.textContent = `WASM runtime exited unexpectedly: ${err}`;
    resultEl.className = 'error';
    runBtn.disabled = true;
  });

  progressBar.style.width = '100%';
  setTimeout(() => { progressBar.style.opacity = '0'; progressBar.style.transition += ', opacity 0.4s'; }, 200);
  statusEl.classList.add('ready');
  statusEl.querySelector('span:last-child').textContent = 'Ready';
  runBtn.disabled = false;
  // Run the pre-filled example immediately once WASM is ready.
  evaluate();
}

loadWasm().catch(err => {
  statusEl.querySelector('span:last-child').textContent = 'Failed to load';
  resultEl.textContent = `Failed to load WASM module: ${err.message || err}`;
  resultEl.className = 'error';
  console.error('WASM load error:', err);
});

function evaluate() {
  const expr = exprEl.value.trim();
  const jsonStr = inputEl.value.trim();

  if (!expr) {
    resultEl.textContent = '';
    timingEl.textContent = '';
    return;
  }

  try {
    const t0 = performance.now();
    const raw = gnataEval(expr, jsonStr || 'null');
    const elapsed = performance.now() - t0;

    let parsed;
    try { parsed = JSON.parse(raw); } catch { parsed = raw; }
    resultEl.textContent = typeof parsed === 'string' ? parsed : JSON.stringify(parsed, null, 2);
    resultEl.className = 'success';
    timingEl.textContent = elapsed < 1 ? `${(elapsed * 1000).toFixed(0)} \u00b5s` : `${elapsed.toFixed(2)} ms`;
  } catch (e) {
    resultEl.textContent = e.message || String(e);
    resultEl.className = 'error';
    timingEl.textContent = '';
  }
}

// Live evaluation: debounce so we don't hammer the WASM on every keystroke.
let debounceTimer = null;
function scheduleEval() {
  clearTimeout(debounceTimer);
  timingEl.textContent = '';
  debounceTimer = setTimeout(evaluate, 300);
}

exprEl.addEventListener('input', scheduleEval);
inputEl.addEventListener('input', scheduleEval);

runBtn.addEventListener('click', () => {
  clearTimeout(debounceTimer);
  evaluate();
});

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    e.preventDefault();
    clearTimeout(debounceTimer);
    evaluate();
  }
});

clearBtn.addEventListener('click', () => {
  clearTimeout(debounceTimer);
  exprEl.value = '';
  inputEl.value = '';
  resultEl.textContent = '';
  resultEl.className = '';
  timingEl.textContent = '';
});

document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const ex = examples[chip.dataset.example];
    if (ex) {
      clearTimeout(debounceTimer);
      exprEl.value = ex.expr;
      inputEl.value = ex.data;
      evaluate();
    }
  });
});
</script>
</body>
</html>
